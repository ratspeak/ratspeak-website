rt Node, Interface, Path, Cryptography, Identity, Link, Forward Secrecy, Ratchet, Messaging, LXMF, Propagation Node, Delivery Modes, Ratspeak-Specific, Hub Node, Safe Restart, Contact Reachability, Graph View, App Layer, RLAP, Session, RLAP Envelope, Fallback Text, Next Steps", "content": "Key Concepts Essential terminology for understanding Reticulum and Ratspeak, grouped by theme. Networking Destination The fundamental addressing unit in Reticulum. A 16-byte truncated SHA-256 hash derived from a cryptographic identity's public key and an application-specific name. Replaces IP addres"}, {"title": "Zen of Reticulum", "section": "Introduction", "path": "introduction/zen-of-reticulum", "headings": "1. The Illusion of the Center, 2. Physics of Trust, 3. Merits of Scarcity, 4. Sovereignty Through Infrastructure, 5. Identity and Nomadism, 6. Ethics of the Tool, 7. Design Patterns for Post-IP Systems, 8. Fabric of the Independent, Next Steps", "content": "Zen of Reticulum The philosophical principles that guide Reticulum's design. These aren't just ideals — they're architectural constraints that shape every protocol decision. > Tip: This page is optional background reading. If you'd rather get hands-on first, skip ahead to Installing Ratspeak. 1. The"}, {"title": "Installing Ratspeak", "section": "Getting Started", "path": "getting-started/installing-ratspeak", "headings": "Prerequisites, Quick Start, What `start.sh` Does, Dashboard-Only Mode, Stopping, Configuration, Verifying the Install, Next Steps", "content": "Installing Ratspeak Get Ratspeak running on your system in a few minutes. Prerequisites - Python 3.11+ (required) - pip (Python package manager) - git (to clone the repository) - bleak and bless (for BLE mesh — installed via requirements.txt) Ratspeak runs on Linux, macOS, and Windows (via WSL or Gi"}, {"title": "First Run", "section": "Getting Started", "path": "getting-started/first-run", "headings": "The Setup Wizard, Identity Creation, Choosing a Display Name, Generated Files, What You'll See, Next Steps", "content": "First Run The first time you launch Ratspeak, it generates a unique cryptographic identity for you and sets up everything needed to join the mesh. Here's what happens and what to look for. The Setup Wizard On first launch, Ratspeak runs through initial setup: 1. Creates your data directory at .ratsp"}, {"title": "Your First Connection", "section": "Getting Started", "path": "getting-started/your-first-connection", "headings": "AutoInterface (WiFi / LAN), TCP Connection, Connection History, Verifying Your Connection, What If Nothing Happens?, Next Steps", "content": "Your First Connection Connect to the Reticulum network — whether that's your local WiFi, a remote TCP node, or a LoRa radio. AutoInterface (WiFi / LAN) The simplest way to connect is via AutoInterface — zero-configuration local network discovery (automatically finds other Reticulum nodes on your WiF"}, {"title": "Sending Your First Message", "section": "Getting Started", "path": "getting-started/sending-your-first-message", "headings": "Adding a Contact, Composing a Message, What Happens Behind the Scenes, Delivery Status, File Attachments, Next Steps", "content": "Sending Your First Message Send an encrypted LXMF message through the Reticulum mesh network. Adding a Contact Before you can message someone, you need their LXMF destination hash — a 32-character hex string like 13425ec15b621c1d928589718000d814. 1. Navigate to the Messages section 2. Click New Conv"}, {"title": "Platform Notes", "section": "Getting Started", "path": "getting-started/platform-notes", "headings": "Linux, Debian / Ubuntu (Bookworm+ / Lunar+), Arch Linux, Fedora / RHEL, macOS, Windows, Raspberry Pi, Android (Termux), Embedded / Constrained Environments, rnspure, OpenWRT, First Run on Any Platform, Next Steps", "content": "Platform Notes Reticulum and Ratspeak run on almost anything with Python. Here are the platform-specific details you may need. Linux Debian / Ubuntu ing an Identity, Switching Identities, Per-Identity Storage, Removing an Identity, Display Names, Next Steps", "content": "Identity Management Create, import, export, and switch between Reticulum identities — all without restarting. What Is an Identity? A Reticulum identity is a 512-bit Curve25519 keyset: - Ed25519 (256 bits) — signing and verification - X25519 (256 bits) — encryption and key exchange Your identity dete"}, {"title": "Network Monitoring", "section": "Using Ratspeak", "path": "using-ratspeak/network-monitoring", "headings": "Connections Table, Interface Stats, Throughput Sparklines, Alert System, RNode Auto-Removal, Status Summaries, Graph View, Next Steps", "content": "Network Monitoring Real-time visibility into your mesh network — connections, interfaces, throughput, and alerts. Connections Table The connections table is the primary view for network health. It shows all discovered destinations with: - Name — the announced display name (if available) - Destinatio"}, {"title": "Graph Visualization", "section": "Using Ratspeak", "path": "using-ratspeak/graph-visualization", "headings": "Overview, Node Types, Edge Types, Interactions, Zoom and Pan, Node Dragging, Pinning Nodes, Node Detail Panel, Search and Filter, Technical Details, Canvas Rendering, Simulation Lifecycle, Data Source, Next Steps", "content": "Graph Visualization A real-time, interactive force-directed graph of your Reticulum mesh network — see your hub, contacts, transport nodes, and discovered peers at a glance. Overview The Graph view renders a live network topology using D3.js force simulation on an HTML Canvas. Nodes represent Reticu"}, {"title": "Games & Apps", "section": "Using Ratspeak", "path": "using-ratspeak/games-and-apps", "headings": "Overview, Available Apps, Games Tab Layout, Session Lifecycle, Playing Chess, Starting a Game, Making Moves, Game End, Fallback Text, Session Details, Status and TTLs, Unread Badges, Size Budget, Next Steps", "content": "Games & Apps Interactive applications built on RLAP — play chess, challenge contacts, and track sessions alongside your messages. Overview The Games tab hosts interactive applications that run over the Reticulum mesh using LXMF messages. Each app session (a chess game, for example) is a series of st"}, {"title": "Propagation Node", "section": "Using Ratspeak", "path": "using-ratspeak/propagation-node", "headings": "What Is a Propagation Node?, Running a Local Propagation Node, Setting an Outbound Propagation Node, Syncing Messages, Propagation Status, Next Steps", "content": "Propagation Node Store-and-forward messaging for offline contacts — how propagation nodes work and how to use them in Ratspeak. What Is a Propagation Node? A propagation node stores encrypted messages for recipients who are currently offline. When the recipient comes back online and syncs with the p"}, {"title": "Configuration", "section": "Using Ratspeak", "path": "using-ratspeak/configuration", "headings": "Config File, Environment Variable Overrides, Settings Reference, `[server]`, `[nodes]`, `[dashboard]`, `[electron]`, Data Directories, Key Constants, Next Steps", "content": "Configuration Complete reference for Ratspeak settings — config file, environment variables, and all available options. Config File Ratspeak reads configuration from dashboard/ratspeak.conf in INI format: Environment Variable Overrides Every setting can be overridden with an environment variable usi"}, {"title": "Interface Types Overview", "section": "Connecting Your Network", "path": "connecting/interface-types-overview", "headings": "Comparison Table, Choosing an Interface, UI-Managed vs Config-Only, Next Steps", "content": "Interface Types Overview A comparison of all interface types available in Reticulum and which can be managed through the Ratspeak UI. Comparison Table Interface Medium Speed Range Managed via UI Restart Required ----------- -------- ------- ------- :--------------: :----------------: AutoInterface W"}, {"title": "T d Role Assignment, GATT Service Architecture, Fragmentation, Background Threads, Enabling BLE Mesh, Deduplication, Limitations, Technical Details, Next Steps", "content": "BLE Mesh Bluetooth Low Energy peer-to-peer mesh networking — the only interface that works without restarting rnsd. Overview BLE Mesh creates peer-to-peer connections between nearby Ratspeak nodes using Bluetooth Low Energy. Unlike all other interface types, BLE Mesh registers directly with the RNS "}, {"title": "Interface Modes", "section": "Connecting Your Network", "path": "connecting/interface-modes", "headings": "Interface Modes, Gateway Mode, Boundary Mode, IFAC — Interface Access Codes, Announce Rate Control, Ingress Control, Mode Abbreviations, Next Steps", "content": "Interface Modes Controlling how interfaces participate in the network — modes, access codes, and announce rate control. Interface Modes Each interface can operate in one of five modes, controlling how it handles packet forwarding, announce propagation, and path discovery: Mode Description Use Case -"}, {"title": "Building Networks", "section": "Connecting Your Network", "path": "connecting/building-networks", "headings": "Transport Nodes vs Instances, Topology Patterns, Star, Mesh, Hierarchical, Backbone + Access, Mixing Hardware Types, Starting Small, Trustless Open Access, Next Steps", "content": "Building Networks Network topology patterns, mixing hardware types, and growing a Reticulum mesh from scratch. Transport Nodes vs Instances The most important architectural decision is which nodes should be Transport Nodes: Type Config Role Requirements ------ -------- ------ ------------- Instance "}, {"title": "Protocol Architecture", "section": "Understanding Reticulum", "path": "understanding/protocol-architecture", "headings": "Destination-Based Addressing, Four Destination Types, The Announce Mechanism, Propagation Rules, Routing, Packet Receipt Verification, Packet Prioritization, Next Steps", "content": "Protocol Architec
