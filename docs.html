overy, announce propagation, and blind forwarding. Transport Nodes vs Instances Every Reticulum node is either a regular instance or a transport node: Type Config Role ------ -------- ------ Instance enable_"}, {"title": "Links & Communication", "section": "Understanding Reticulum", "path": "understanding/links-and-communication", "headings": "Link Establishment, The Handshake, Key Properties, Link Timers, Resources, Channels, Buffers, Request / Response, What's Next", "content": "Links & Communication Encrypted bidirectional channels — the 297-byte handshake, forward secrecy, resources, channels, and request/response. Link Establishment Links provide encrypted, bidirectional communication with forward secrecy and initiator anonymity. The entire handshake takes just 3 packets"}, {"title": "Security Model", "section": "Understanding Reticulum", "path": "understanding/security-model", "headings": "Zero-Trust Architecture, Forward Secrecy, 1. Ephemeral Keys on Links, 2. Ratchet System (Single Destinations), Ratchet Parameters, Sender Anonymity, Traffic Analysis Resistance, Blackhole Management, What Reticulum Does NOT Protect Against, What's Next", "content": "Security Model Forward secrecy, zero-trust design, ratchets, and how Reticulum's architecture makes surveillance structurally difficult. Zero-Trust Architecture Reticulum assumes every environment is hostile. There is no trusted core, no certificate authority, no privileged infrastructure. Security "}, {"title": "Cryptographic Primitives", "section": "Understanding Reticulum", "path": "understanding/cryptographic-primitives", "headings": "Algorithm Suite, How They Fit Together, Identity (at rest), Destination Hash (derived), Per-Packet Encryption (Single destinations), Link Encryption, Announce Signing, Encrypted Token Format, AES-256 Migration, Implementation, Pure-Python Fallback, What's Next", "content": "Cryptographic Primitives The specific algorithms and constructions that power Reticulum's security. Algorithm Suite Primitive Algorithm Key/Output Size Purpose ----------- ----------- :-----------: --------- Digital Signatures Ed25519 256-bit Signing announces, proofs, link verification Key Exchange"}, {"title": "LXMF Protocol", "section": "Understanding Reticulum", "path": "understanding/lxmf-protocol", "headings": "Overview, Delivery Modes, Direct, Opportunistic, Propagated, LXMF Fields, Propagation Nodes, Ecosystem Compatibility, LXST — Streaming Companion, Message Size Considerations, What's Next", "content": "LXMF Protocol Lightweight Extensible Message Format — zero-configuration encrypted messaging over Reticulum. Overview LXMF is a messaging protocol built on top of Reticulum that provides: - Zero-configuration message routing — no servers to configure - End-to-end encryption — every message is encryp"}, {"title": "Wire Format", "section": "Understanding Reticulum", "path": "understanding/wire-format", "headings": "Packet Structure, Header Byte 1 (Flags), Header Byte 2 (Hop Count), Address Field, Maximum Data Units, Why 500 Bytes?, IFAC Packets, What's Next", "content": "Wire Format The binary structure of Reticulum packets — header fields, addressing, and the 500-byte MTU. Packet Structure Every Reticulum packet follows this format: Total maximum size: 500 bytes (network-wide MTU, fixed). Header Byte 1 (Flags) Bit Field Values ----- ------- -------- 7 IFAC Flag 0 ="}, {"title": "Network Identities", "section": "Understanding Reticulum", "path": "understanding/network-identities", "headings": "What Are Network Identities?, Creating a Network Identity, Current Uses, Interface Discovery, Whitelisting, Encrypted Discovery, How It Works, Security Considerations, Reference Identity, What's Next", "content": "Network Identities Using Reticulum identities to represent networks, communities, and groups of nodes — beyond individual user identities. What Are Network Identities? A Network Identity is a standard Reticulum identity (512-bit Ed25519 + X25519 keyset) used to represent a logical group rather than "}, {"title": "Stamps & Proof-of-Work", "section": "Understanding Reticulum", "path": "understanding/stamps", "headings": "What Are Stamps?, Why Stamps Exist, How Stamps Work, Verification, Configuring Stamp Difficulty, On Discoverable Interfaces, On Receiving Nodes, When Stamps Are Required, Stamps and Network Identities, What's Next", "content": "Stamps & Proof-of-Work How Reticulum uses cryptographic stamps to prevent spam, rate-limit announces, and ensure fair resource usage on constrained networks. What Are Stamps? A stamp is a proof-of-work value attached to certain Reticulum operations — primarily interface discovery announces. The send"}, {"title": "Ingress Control", "section": "Understanding Reticulum", "path": "understanding/ingress-control", "headings": "What Is Ingress Control?, Why It Matters, How It Works, Configuration, Parameters, New vs Established Sub-Interfaces, Interaction with Other Rate Controls, Tuning for Your Network, Public Internet Gateways, LoRa Access Points, Private Networks, What's Next", "content": "Ingress Control How Reticulum rate-limits incoming announces to protect nodes from being overwhelmed, especially on public interfaces and constrained links. What Is Ingress Control? Ingress control is Reticulum's mechanism for rate-limiting incoming announce traffic on a per-interface basis. When a "}, {"title": "Blackhole Management", "section": "Understanding Reticulum", "path": "understanding/blackhole-management", "headings": "What Is Blackholing?, Local Blackhole Management, Blocking an Identity, Removing a Blackhole, Viewing the Blackhole List, Automated List Sourcing, Subscribing to a Source, Previewing a Remote List, Publishing Your Blackhole List, Best Practices for Publishers, Remote Blackhole Management, Use Cases, Blocking Announce Spam, Managing Network Access, Community Moderation, Limitations, What's Next", "content": "Blackhole Management Blocking specific identities at the transport layer — managing local blackhole lists, subscribing to trusted sources, and publishing lists for your network. What Is Blackholing? Blackholing is Reticulum's mechanism for blocking specific identities at the transport layer. When an"}, {"title": "Architecture Overview", "section": "Developer Guide", "path": "developer/architecture-overview", "headings": "Dual Implementation, System Architecture, Core Components, Web Server Layer, LXMF Manager, Game Router (LRGP), RNS Manager, Database, Data Flow, Sending a Message, Receiving a Message, Thread Model, Python (Ratspeak-py), Rust (Ratspeak-rs), Configuration, Directory Structure, What's Next", "content": "Architecture Overview A high-level look at how Ratspeak is built — both the Python and Rust implementations, their shared design philosophy, and how the pieces fit together. Dual Implementation Ratspeak has two independent backends that share the same frontend and database schema: Component Ratspeak"}, {"title": "Ratspeak-py Backend", "section": "Developer Guide", "path": "developer/ratspeak-py", "headings": "Technology Stack, Module Map, Key Modules, app.py (~6500 lines), database.py (~1300 lines), lxmf_manager.py (~2100 lines), app_router.py (~350 lines), rns_manager.py (~1000 lines), node_manager.py (~800 lines), identity_manager.py (~350 lines), Threading Model, Configuration, ratspeak.conf, Environment Variable Overrides, Security, Installation & Development, What's Next", "content": "Ratspeak-py Backend The Python implementation of Ratspeak — built on Flask, Flask-SocketIO, and the python-rns/python-lxmf libraries. Technology Stack Component Library Version ----------- --------- --------- Web framework Flask Latest WebSocket Flask-SocketIO Latest Mesh networking RNS >= 0.9.1 Mes"}, {"title": "Ratspeak-rs Backend", "section": "Developer Guide", "path": "developer/ratspeak-rs", "headings": "Technology Stack, Workspace Structure, Protocol Layer (Core), Network Layer, Application Layer, Dashboard Crate, Startup Flow, B
